<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Barbearia</title>
    <!-- Adiciona o Tailwind CSS para estilização -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }
    </style>
    <!-- Importa os SDKs do Firebase -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-6">Login do Barbeiro</h1>

        <form id="loginForm">
            <div class="mb-4">
                <label for="email" class="block text-gray-700 text-sm font-bold mb-2">Email</label>
                <input type="email" id="email" name="email" placeholder="seu-email@exemplo.com" required
                       class="shadow appearance-none border rounded-lg w-full py-3 px-4 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500 transition duration-200">
            </div>
            <div class="mb-6">
                <label for="password" class="block text-gray-700 text-sm font-bold mb-2">Senha</label>
                <input type="password" id="password" name="password" placeholder="Sua senha" required
                       class="shadow appearance-none border rounded-lg w-full py-3 px-4 text-gray-700 mb-3 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500 transition duration-200">
            </div>
            <div class="flex items-center justify-between">
                <button type="submit"
                        class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50 transition duration-200 w-full">
                    Entrar
                </button>
            </div>
        </form>

        <div id="loginMessage" class="mt-6 text-center text-sm font-semibold"></div>
    </div>

    <!-- Script JavaScript para a lógica de login -->
    <script>
        // O código JavaScript corrigido
        const API_BASE_URL = 'https://barbearia-backend-9h56.onrender.com/api';

        // **IMPORTANTE**: Substitua os placeholders abaixo com as suas credenciais do Firebase.
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Inicializa o Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();

        document.addEventListener('DOMContentLoaded', () => {
            const loginForm = document.getElementById('loginForm');
            const loginMessage = document.getElementById('loginMessage');

            loginForm.addEventListener('submit', async (event) => {
                event.preventDefault();
                loginMessage.textContent = '';
                loginMessage.className = 'mt-4 text-center text-sm sm:text-lg font-semibold';

                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;

                if (!email || !password) {
                    loginMessage.textContent = 'Por favor, preencha todos os campos.';
                    loginMessage.classList.add('text-red-500');
                    return;
                }

                try {
                    loginMessage.textContent = 'Autenticando...';
                    loginMessage.classList.add('text-blue-400');

                    // 1. O cliente do Firebase faz o login e verifica a senha de forma segura.
                    const userCredential = await auth.signInWithEmailAndPassword(email, password);
                    const user = userCredential.user;

                    // 2. Obtém o ID Token, que é a prova de autenticação do usuário.
                    const idToken = await user.getIdToken();

                    // 3. Envia o ID Token para o backend para obter os dados do barbeiro.
                    const response = await fetch(`${API_BASE_URL}/auth/profile`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${idToken}`
                        }
                    });

                    const data = await response.json();

                    if (response.ok) {
                        // 4. Armazena o ID Token e os dados do barbeiro no localStorage.
                        localStorage.setItem('token', idToken);
                        localStorage.setItem('barber', JSON.stringify(data.barber));

                        loginMessage.textContent = 'Login bem-sucedido!';
                        loginMessage.classList.add('text-green-500');

                        setTimeout(() => {
                            window.location.href = 'barber-dashboard.html';
                        }, 1000);
                    } else {
                        loginMessage.textContent = data.message || 'Erro ao buscar dados do barbeiro.';
                        loginMessage.classList.add('text-red-500');
                        console.error('Erro no backend após autenticação:', data.message);
                    }
                } catch (error) {
                    let errorMessage = 'Erro ao fazer login. Verifique seu email e senha.';
                    if (error.code === 'auth/user-not-found') {
                        errorMessage = 'Usuário não encontrado.';
                    } else if (error.code === 'auth/wrong-password') {
                        errorMessage = 'Senha incorreta.';
                    }
                    loginMessage.textContent = errorMessage;
                    loginMessage.classList.add('text-red-500');
                    console.error('Erro de login do Firebase:', error);
                }
            });
        });
    </script>
</body>
</html>
