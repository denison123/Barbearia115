<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Barbeiro</title>
    <!-- Incluindo Tailwind CSS para um estilo moderno e responsivo -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Estilos personalizados para o corpo da página */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6; /* Cinza claro */
        }

        /* Estilos para o container principal */
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Estilos para o card do formulário de login */
        .login-card {
            background-color: white;
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            width: 100%;
            max-width: 28rem; /* Largura máxima do card */
        }
    </style>
</head>
<body>

<div class="container">
    <div class="login-card">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-6">Login do Barbeiro</h1>

        <!-- Formulário de Login -->
        <form id="loginForm" class="space-y-4">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
                <input type="email" id="email" name="email" required placeholder="seu-email@exemplo.com"
                       class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700">Senha</label>
                <input type="password" id="password" name="password" required placeholder="Sua senha"
                       class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
            </div>

            <button type="submit"
                    class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                Entrar
            </button>
        </form>

        <!-- Área para mensagens de status -->
        <div id="messageBox" class="mt-4 p-3 hidden rounded-md text-sm text-center"></div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const loginForm = document.getElementById('loginForm');
        const messageBox = document.getElementById('messageBox');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Exibe a mensagem de carregamento
            showMessage('Realizando login...', 'bg-blue-100 text-blue-700');

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                // Endpoint para a API de login no seu backend
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password }),
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage('Login bem-sucedido!', 'bg-green-100 text-green-700');
                    console.log('Login bem-sucedido:', data);

                    // Ações a serem tomadas após o login (por exemplo, redirecionar para o dashboard)
                    // No exemplo, apenas loga no console.
                    // Você pode adicionar um redirecionamento aqui: window.location.href = '/barber-dashboard.html';
                } else {
                    showMessage(data.message || 'Falha no login. Verifique suas credenciais.', 'bg-red-100 text-red-700');
                    console.error('Erro no login:', data.message);
                }
            } catch (error) {
                showMessage('Ocorreu um erro. Tente novamente.', 'bg-red-100 text-red-700');
                console.error('Erro de rede ou servidor:', error);
            }
        });

        // Função auxiliar para exibir mensagens
        function showMessage(text, className) {
            messageBox.textContent = text;
            messageBox.className = `mt-4 p-3 rounded-md text-sm text-center ${className}`;
            messageBox.style.display = 'block';
        }
    });
</script>

</body>
</html>
